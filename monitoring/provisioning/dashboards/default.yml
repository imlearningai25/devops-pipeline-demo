# monitoring/provisioning/dashboards/default.yml
# -----------------------------------------------
# Grafana dashboard provisioning file.
# Tells Grafana WHERE to look for dashboard JSON files on the filesystem.
# Grafana reads this on startup and imports every .json file it finds
# in the specified 'path'.

apiVersion: 1

providers:
  - name: "DevOps Demo Dashboards"
    orgId: 1
    # The folder name that appears in the Grafana Dashboards menu
    folder: "DevOps Demo"
    type: file
    disableDeletion: false    # Allow deleting dashboards via the UI
    updateIntervalSeconds: 30 # Re-scan for new/updated JSON files every 30 s
    allowUiUpdates: true      # Allow editing dashboards in the UI

    options:
      # Path INSIDE the Grafana container where JSON files are stored.
      # We mount grafana-dashboard.json here via the Docker volume in docker-compose.
      path: /var/lib/grafana/dashboards
