# monitoring/docker-compose.monitoring.yml
# ─────────────────────────────────────────
# Spins up the Prometheus + Grafana monitoring stack locally.
#
# USAGE:
#   cd devops-pipeline-demo
#   docker-compose -f monitoring/docker-compose.monitoring.yml up -d
#
# ACCESS:
#   Grafana    → http://localhost:3000  (login: admin / admin)
#   Prometheus → http://localhost:9090
#
# STOP & CLEAN UP:
#   docker-compose -f monitoring/docker-compose.monitoring.yml down -v
#
# HOW AUTO-PROVISIONING WORKS:
#   Grafana supports "provisioning" – loading data sources and dashboards
#   from files on startup, instead of clicking through the UI.
#   We use two Docker volume mounts to achieve this:
#     1. provisioning/datasources/ → adds Prometheus as a data source
#     2. provisioning/dashboards/  → loads grafana-dashboard.json automatically
#   When Grafana starts, it reads these directories and configures itself.
#   The dashboard appears under: Dashboards → DevOps Pipeline Demo – Flask App

version: "3.8"

services:

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0     # Pin to a specific version for reproducibility
    container_name: devops-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"                    # Access Prometheus UI at http://localhost:9090

    volumes:
      # Mount our prometheus.yml config file into the container.
      # Prometheus reads this on startup; use /-/reload to reload without restart.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

      # Named volume to persist Prometheus data between restarts.
      # Without this, all metric history is lost when the container stops.
      - prometheus-data:/prometheus

    command:
      # Pass arguments to the prometheus binary
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Keep 15 days of data (adjust based on disk space)
      - "--storage.tsdb.retention.time=15d"
      # Enable the HTTP API used by Grafana and the /-/reload endpoint
      - "--web.enable-lifecycle"

    networks:
      - monitoring


  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0      # Pin to a specific version
    container_name: devops-grafana
    restart: unless-stopped

    ports:
      - "3000:3000"                    # Access Grafana at http://localhost:3000

    environment:
      # Default admin credentials – change these in production!
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin

      # Disable the "change password" prompt on first login (nicer for demos)
      GF_AUTH_DISABLE_LOGIN_FORM: "false"

      # Allow anonymous access (read-only) – useful for sharing dashboards
      # Set to "true" if you want to view dashboards without logging in
      GF_AUTH_ANONYMOUS_ENABLED: "false"

      # Disable Grafana's telemetry reporting
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"

    volumes:
      # Named volume to persist Grafana state (dashboards, users, settings)
      - grafana-data:/var/lib/grafana

      # ── Auto-provisioning: Prometheus data source ──────────────────────
      # This file tells Grafana to add Prometheus as a data source on startup.
      # We write it inline using a Docker bind mount to a temp dir, then
      # reference it via the provisioning directory Grafana scans.
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro

      # ── Auto-provisioning: Dashboard loader ───────────────────────────
      # This directory tells Grafana WHERE to find dashboard JSON files.
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

      # ── The actual dashboard JSON ─────────────────────────────────────
      # Mount the dashboard JSON where the provisioner looks for it.
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/devops-demo.json:ro

    depends_on:
      - prometheus    # Start Prometheus first so Grafana can connect on boot

    networks:
      - monitoring


# ── Networks ───────────────────────────────────────────────────────────────
networks:
  monitoring:
    # Bridge network: containers can reach each other by service name (e.g. 'prometheus')
    driver: bridge
    name: devops-monitoring-net


# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  prometheus-data:
    # Docker-managed volume – persists Prometheus TSDB data
    name: devops-prometheus-data

  grafana-data:
    # Docker-managed volume – persists Grafana config, users, and dashboards
    name: devops-grafana-data
